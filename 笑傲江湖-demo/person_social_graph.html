<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>笑傲江湖 — 人物關係圖</title>
  <script src="vendor/d3.v7.min.js"></script>
  <style>
:root { --bg:#0b1020; --panel:#111828; --ink:#d7e2ff; --muted:#8aa0d6; --line:#1f2f5a; }
html,body { width:100%; height:100%; margin:0; overflow:hidden; background:var(--bg); color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans TC",sans-serif; }
.app { display:grid; grid-template-columns:300px 1fr; grid-template-rows:auto minmax(0,1fr); width:100%; height:100vh; overflow:hidden; }
header { grid-column:1/3; padding:10px 16px; background:linear-gradient(90deg,#0e1530,#0b1020 50%); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; }
h1 { margin:0; font-size:17px; line-height:1.35; }
.small { color:var(--muted); font-size:11px; }
.panel-toggle,.panel-backdrop { display:none; }
.panel-toggle { cursor:pointer; padding:7px 11px; border-radius:9px; border:1px solid var(--line); background:#0d1633; color:#cfe2ff; font-size:13px; white-space:nowrap; }
aside { min-height:0; background:var(--panel); padding:12px; border-right:1px solid var(--line); overflow:auto; overscroll-behavior:contain; }
main { position:relative; min-width:0; min-height:0; overflow:hidden; }
#graph { width:100%; height:100%; display:block; }
.toolbar { display:grid; gap:10px; }
.card { background:#0f1733; border:1px solid #22305b; border-radius:10px; padding:10px; }
.card h3 { margin:0 0 8px; font-size:13px; color:#bcd0ff; }
label { display:flex; align-items:center; gap:8px; margin:5px 0; font-size:13px; }
input,select { width:100%; box-sizing:border-box; padding:7px 9px; border-radius:8px; border:1px solid var(--line); background:#0c1430; color:var(--ink); font-size:13px; }
input[type="range"] { padding:0; }
input[type="number"] { width:90px; }
select { width:90px; }
.param-row { display:grid; grid-template-columns:68px minmax(0,1fr) 38px; align-items:center; gap:8px; margin:7px 0; font-size:13px; }
.param-value { color:var(--muted); text-align:right; }
.row { margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; }
.btn { cursor:pointer; display:inline-flex; align-items:center; gap:6px; padding:7px 10px; border-radius:9px; border:1px solid var(--line); background:#0d1633; color:#cfe2ff; font-size:13px; }
.btn:hover { border-color:#4164d6; }
.legend { display:flex; flex-wrap:wrap; gap:6px; }
.badge { display:inline-flex; gap:5px; align-items:center; padding:3px 8px; border-radius:999px; border:1px solid var(--line); background:#111a3a; font-size:12px; cursor:pointer; }
.dot { width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
.link { fill:none; stroke:#6f7fae; stroke-opacity:.15; stroke-linecap:round; }
.link.hover { stroke:#9ab0f0; stroke-opacity:.85; }
.link.dim { opacity:.04; }
.node circle { stroke:#0b1020; stroke-width:2.5; }
.node text { font-size:12px; fill:#dfe7ff; paint-order:stroke; stroke:#0b1020; stroke-width:3; stroke-linejoin:round; }
.node.dim circle,.node.dim text { opacity:.15; }
.tooltip { position:absolute; pointer-events:none; background:#101835; border:1px solid var(--line); border-radius:9px; padding:8px 10px; color:#e8f0ff; font-size:12px; box-shadow:0 6px 18px rgba(0,0,0,.38); max-width:280px; display:none; }
.watermark { position:absolute; right:14px; bottom:10px; color:#3a4e7a; font-size:11px; }
@media (max-width:900px) {
  .app { grid-template-columns:1fr; grid-template-rows:auto minmax(0,1fr); }
  header { grid-column:1; display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; }
  h1 { font-size:15px; }
  .panel-toggle { display:inline-flex; z-index:25; }
  aside { position:fixed; z-index:20; left:0; top:0; bottom:0; width:min(86vw,300px); box-sizing:border-box; transform:translateX(-105%); transition:transform .22s ease; box-shadow:20px 0 48px rgba(0,0,0,.34); }
  body.panel-open aside { transform:translateX(0); }
  .panel-backdrop { position:fixed; inset:0; z-index:15; border:0; background:rgba(3,7,18,.48); display:none; }
  body.panel-open .panel-backdrop { display:block; }
  main { grid-column:1; grid-row:2; }
}
  </style>
</head>
<body>
<div class="app">
  <header>
    <button class="panel-toggle" id="panelToggle" type="button" aria-expanded="false">控制</button>
    <h1>笑傲江湖 — 人物關係圖 <span class="small">D3 力導向圖・同段共現</span></h1>
  </header>
  <aside id="graphControls">
    <div class="toolbar">
      <div class="card">
        <h3>搜尋人物</h3>
        <input id="searchInput" placeholder="輸入姓名，如 令狐冲">
        <div class="row">
          <button class="btn" id="btnFocus">聚焦</button>
          <button class="btn" id="btnClear">清除</button>
        </div>
      </div>
      <div class="card">
        <h3>派系 / 陣營</h3>
        <div class="legend" id="factionLegend"></div>
      </div>
      <div class="card">
        <h3>篩選</h3>
        <label>最低共現次數 <input id="minWeight" type="number" min="1" value="20"></label>
        <label>顯示節點數 <select id="nodeLimit"><option>20</option><option selected>35</option><option>50</option><option>60</option></select></label>
      </div>
      <div class="card">
        <h3>物理參數</h3>
        <div class="param-row"><span>斥力</span><input id="charge" type="range" min="80" max="1200" step="20" value="380"><span class="param-value" id="chargeVal">380</span></div>
        <div class="param-row"><span>線距</span><input id="linkDist" type="range" min="20" max="300" step="10" value="110"><span class="param-value" id="linkDistVal">110</span></div>
        <div class="row"><button class="btn" id="btnRebuild">重新佈局</button></div>
      </div>
    </div>
  </aside>
  <button class="panel-backdrop" id="panelBackdrop" type="button" aria-label="關閉"></button>
  <main>
    <svg id="graph"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="watermark">笑傲江湖人物共現圖</div>
  </main>
</div>

<script>
// ── Panel toggle ──
const panelToggle = document.getElementById('panelToggle');
const panelBackdrop = document.getElementById('panelBackdrop');
function setPanelOpen(open) {
  document.body.classList.toggle('panel-open', open);
  panelToggle.setAttribute('aria-expanded', String(open));
}
panelToggle.addEventListener('click', () => setPanelOpen(!document.body.classList.contains('panel-open')));
panelBackdrop.addEventListener('click', () => setPanelOpen(false));

// ── Faction config ──
const factionColors = {
  huashan:    '#ff9f43',
  shengjiao:  '#e84393',
  songshan:   '#5ba3d9',
  hengshan_m: '#6bba75',
  hengshan_f: '#c7a6ff',
  taishan:    '#64d5ff',
  shaolin:    '#ffd36b',
  fujian:     '#4ecdc4',
  taogu:      '#ffb65c',
  other:      '#8aa0d6',
};
const factionNames = {
  huashan:    '華山派',
  shengjiao:  '日月神教',
  songshan:   '嵩山派',
  hengshan_m: '衡山派',
  hengshan_f: '恆山派',
  taishan:    '泰山派',
  shaolin:    '少林 / 武當',
  fujian:     '福建',
  taogu:      '桃谷六仙',
  other:      '其他江湖人士',
};
const subtypeNames = { main: '主要人物', secondary: '次要人物' };

// ── D3 setup ──
const svg = d3.select('#graph');
const g = svg.append('g');
const linkLayer = g.append('g');
const nodeLayer = g.append('g');
const tooltip = d3.select('#tooltip');
const factionState = new Map();
const zoom = d3.zoom().scaleExtent([.18, 5]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

let baseData = null;
let graphData = null;
let simulation = null;
let linkSel, nodeSel;
let focusedId = null;

// ── Data loading ──
async function loadJson(path) {
  if (window.DEMO_JSON && window.DEMO_JSON[path]) return window.DEMO_JSON[path];
  try {
    const r = await fetch(path);
    if (!r.ok) throw new Error();
    return r.json();
  } catch {
    return loadJsonScript(path);
  }
}
function loadJsonScript(path) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = path + '.js';
    s.onload = () => window.DEMO_JSON?.[path] ? resolve(window.DEMO_JSON[path]) : reject();
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

loadJson('data/person_social_network.json').then(data => {
  baseData = data;
  initFactionLegend();
  buildGraph();
});

// ── Legend ──
function initFactionLegend() {
  const factions = [...new Set(baseData.nodes.map(n => n.faction || 'other'))];
  const order = Object.keys(factionColors);
  factions.sort((a, b) => order.indexOf(a) - order.indexOf(b));
  const box = d3.select('#factionLegend');
  factions.forEach(faction => {
    factionState.set(faction, true);
    const item = box.append('div').attr('class', 'badge');
    item.append('div').attr('class', 'dot').style('background', factionColors[faction] || factionColors.other);
    item.append('span').text(factionNames[faction] || faction);
    item.on('click', () => {
      const cur = factionState.get(faction);
      factionState.set(faction, !cur);
      item.style('opacity', cur ? .35 : 1);
      updateVisibility();
    });
  });
}

// ── Filter ──
function filteredData() {
  const limit = Number(document.getElementById('nodeLimit').value);
  const minW = Number(document.getElementById('minWeight').value);
  const topNodes = baseData.nodes.slice().sort((a, b) => b.weighted_degree - a.weighted_degree).slice(0, limit);
  const topIds = new Set(topNodes.map(n => n.id));
  const nodes = topNodes.map(n => ({ ...n }));
  const links = baseData.links
    .filter(l => topIds.has(l.source) && topIds.has(l.target) && l.weight >= minW)
    .map(l => ({ ...l }));
  return { nodes, links };
}

// ── Build graph ──
function buildGraph() {
  graphData = filteredData();
  clearFocus();
  if (simulation) simulation.stop();
  const width = svg.node().clientWidth || window.innerWidth - 300;
  const height = svg.node().clientHeight || window.innerHeight - 50;
  const charge = Number(document.getElementById('charge').value);
  const dist = Number(document.getElementById('linkDist').value);

  simulation = d3.forceSimulation(graphData.nodes)
    .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(dist).strength(d => Math.min(.5, .05 + d.weight / 600)))
    .force('charge', d3.forceManyBody().strength(-charge))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collide', d3.forceCollide().radius(d => nodeRadius(d) + 6));

  linkSel = linkLayer.selectAll('line')
    .data(graphData.links, d => d.id)
    .join('line')
    .attr('class', 'link')
    .attr('stroke-width', d => Math.max(.5, Math.sqrt(d.weight) / 4));

  nodeSel = nodeLayer.selectAll('g')
    .data(graphData.nodes, d => d.id)
    .join(enter => {
      const n = enter.append('g').attr('class', 'node').call(drag(simulation));
      n.append('circle')
        .attr('r', nodeRadius)
        .attr('fill', d => factionColors[d.faction] || factionColors.other);
      n.append('text').attr('x', d => nodeRadius(d) + 4).attr('y', 4).text(d => d.name);
      n.on('mouseenter', showTooltip).on('mouseleave', () => tooltip.style('display', 'none'));
      n.on('click', (e, d) => focusNode(d));
      return n;
    });

  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });
  updateVisibility();
}

function nodeRadius(d) { return 6 + Math.sqrt(d.frequency || 1) / 9; }

function drag(sim) {
  return d3.drag()
    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });
}

function nid(ep) { return typeof ep === 'string' ? ep : ep.id; }
function nname(ep) { return typeof ep === 'string' ? ep : ep.name; }

function nodeLinks(id) {
  return graphData.links
    .filter(l => nid(l.source) === id || nid(l.target) === id)
    .sort((a, b) => b.weight - a.weight);
}

function showTooltip(event, d) {
  const related = nodeLinks(d.id).slice(0, 8)
    .map(l => {
      const other = nid(l.source) === d.id ? nname(l.target) : nname(l.source);
      return `${other}（共現 ${l.weight} 段）`;
    }).join('<br>');
  tooltip
    .style('display', 'block')
    .html(`<b>${d.name}</b><br>派系：${factionNames[d.faction] || d.faction}<br>出現：${d.frequency.toLocaleString()} 次・${d.paragraph_count} 段<br>關聯人物：${d.degree}<hr style="border:0;border-top:1px solid #2a3a6b;margin:6px 0">${related}`)
    .style('left', `${event.pageX + 12}px`)
    .style('top',  `${event.pageY + 10}px`);
}

function updateVisibility() {
  if (!nodeSel || !linkSel) return;
  nodeSel.attr('display', d => factionState.get(d.faction) !== false ? null : 'none');
  const visible = new Set(nodeSel.filter(function() { return this.getAttribute('display') !== 'none'; }).data().map(d => d.id));
  linkSel.attr('display', d => visible.has(nid(d.source)) && visible.has(nid(d.target)) ? null : 'none');
}

function focusNode(d) {
  focusedId = d.id;
  document.getElementById('searchInput').value = d.name;
  const neigh = new Set([d.id]);
  nodeLinks(d.id).forEach(l => { neigh.add(nid(l.source)); neigh.add(nid(l.target)); });
  nodeSel.classed('dim', n => !neigh.has(n.id));
  linkSel
    .classed('dim', l => !(nid(l.source) === d.id || nid(l.target) === d.id))
    .classed('hover', l => nid(l.source) === d.id || nid(l.target) === d.id);
}

function clearFocus() {
  focusedId = null;
  if (nodeSel) nodeSel.classed('dim', false);
  if (linkSel) linkSel.classed('dim hover', false);
}

// ── Controls ──
document.getElementById('btnFocus').addEventListener('click', () => {
  const q = document.getElementById('searchInput').value.trim();
  if (!q || !graphData) return;
  const d = graphData.nodes.find(n => n.name === q || n.name.includes(q));
  if (d) focusNode(d);
});
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  clearFocus();
  updateVisibility();
});
document.getElementById('btnRebuild').addEventListener('click', buildGraph);
['minWeight', 'nodeLimit'].forEach(id => document.getElementById(id).addEventListener('change', buildGraph));
['charge', 'linkDist'].forEach(id => {
  const el = document.getElementById(id);
  const valEl = document.getElementById(id + 'Val');
  el.addEventListener('input', () => {
    valEl.textContent = el.value;
    if (simulation) {
      if (id === 'charge') simulation.force('charge', d3.forceManyBody().strength(-Number(el.value)));
      if (id === 'linkDist') simulation.force('link').distance(Number(el.value));
      simulation.alpha(.4).restart();
    }
  });
});
</script>
</body>
</html>
